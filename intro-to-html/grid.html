<!DOCTYPE html>
<html>

<head>
  <title>Grid practice</title>
</head>

<body style="padding-bottom: 2000px;">
  <div style="display: grid;grid-template-columns: 100px 100px ;">
    <div style="background-color: rgb(246, 86, 222);">Div 1</div>
    <div style="background-color: rgb(253, 188, 108);">Div 2</div>
  </div>

   <div style="display: grid;grid-template-columns: 100px 100px 200px;margin-top: 20px;">
    <div style="background-color: rgb(246, 86, 222);">Div 1</div>
    <div style="background-color: rgb(253, 188, 108);">Div 2</div>
    <div style="background-color: rgb(246, 86, 222);">Div 3</div>
    <div style="background-color: rgb(253, 188, 108);">Div 4</div>
  </div>

     <div style="display: grid;grid-template-columns: 100px 1fr;margin-top: 20px;">
    <div style="background-color: rgb(246, 86, 222);">Div 1</div>
    <div style="background-color: rgb(253, 188, 108);">Div 2</div>
    </div>

    <div style="display: grid;grid-template-columns: 1fr 100px 2fr;margin-top: 20px;">
      <div style="background-color: rgb(246, 86, 222);">Div 1</div>
      <div style="background-color: rgb(253, 188, 108);">Div 2</div>
      <div style="background-color: rgb(246, 86, 222);">Div 3</div>
    </div>

    
    <div style="display: grid;grid-template-columns: 1fr 1fr 1fr;margin-top: 20px;column-gap: 20px;
    row-gap: 40px;">
      <div style="height: 200px; background-color: rgb(246, 86, 222);">Div 1</div>
      <div style="height: 200px; background-color: rgb(253, 188, 08);">Div 2</div>
      <div style="height: 200px; background-color: rgb(246, 86, 222);">Div 3</div>
      <div style="height: 200px; background-color: rgb(253, 188, 08);">Div 2</div>
      <div style="height: 200px; background-color: rgb(246, 86, 222);">Div 3</div>
       <div style="height: 200px; background-color: rgb(253, 188, 08);">Div 2</div>
 
      
    </div>
</body>

</html>
