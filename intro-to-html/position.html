<!DOCTYPE html>
<html>

<head>
  <title>Position practice</title>
</head>

<body style="padding-bottom: 2000px;
padding-left: 80px;
padding-top: 60px;">
  <div style="background-color: black;
      position:fixed ;
      top: 0px;
      right:0;
      left:0;
      height:50px;
      color: aliceblue;">
    Header
  </div>


  <div style="background-color: rgb(0, 192, 128);
      position: fixed;
      left: 0px;
      bottom: 0px;
      top: 50px;
      width: 72px;
      color: aliceblue;">
    Side Bar
      <div style="position: absolute;
      background-color: rgb(14, 67, 244);
      color: aliceblue;
      right: 0px;
      top: 0px;">
        X
  </div>
  </div>

  <div style="position: absolute;
      background-color: rgb(14, 67, 244);
      color: aliceblue;
      right: 10px;
      top: 60px;">
    absolute
  </div>



  <div style="background-color: lightblue; 
      height: 200px;width: 200px;
      ">Div 1</div>
  <div style="background-color: lightcoral; 
      height: 200px;width: 200px;position: relative;
      ">Div 2  <div style="position: absolute;
      background-color: rgb(0, 0, 0);
      color: aliceblue;
      bottom: 10px;
      right: 10px;">
   5.00
  </div>
  </div>

</body>

</html>
